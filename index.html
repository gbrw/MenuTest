<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Menu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial,sans-serif;
background:#f6efe7;
color:#24170f;
}

.hero{
height:300px;
position:relative;
overflow:hidden;
border-bottom-left-radius:36px;
border-bottom-right-radius:36px;
}

.hero img.cover{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(45%);
}

.hero-content{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:95px;
height:95px;
border-radius:50%;
background:white;
padding:10px;
object-fit:contain;
margin-bottom:14px;
}

.hero h1{
font-size:34px;
margin-bottom:8px;
}

.hero p{
font-size:15px;
opacity:.9;
}

.search{
padding:18px;
}

.search input{
width:100%;
padding:15px 18px;
border:0;
border-radius:18px;
font-size:16px;
outline:0;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.categories{
position:sticky;
top:0;
z-index:10;
background:#f6efe7;
display:flex;
gap:12px;
overflow-x:auto;
padding:0 18px 18px;
}

.categories button{
border:0;
background:white;
color:#3b2618;
padding:12px 18px;
border-radius:18px;
white-space:nowrap;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
transition:.2s;
}

.categories button i{
font-size:16px;
}

.categories button.active{
background:#3b2418;
color:white;
}

.menu-section{
padding:10px 18px 24px;
scroll-margin-top:80px;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
margin-bottom:16px;
color:#3b2418;
}

.section-title i{
font-size:22px;
width:30px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
gap:16px;
}

.card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:145px;
object-fit:cover;
background:#ddd;
}

.card-body{
padding:14px;
}

.card h3{
font-size:17px;
margin-bottom:6px;
}

.card p{
font-size:13px;
color:#6a5a4e;
line-height:1.5;
margin-bottom:10px;
}

.price{
font-weight:bold;
color:#a66a2c;
font-size:16px;
}

.sizes{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

.size-btn{
border:1px solid #ead7c5;
background:#fff7ef;
color:#3b2418;
padding:7px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
cursor:pointer;
}

.size-btn.active{
background:#3b2418;
color:white;
border-color:#3b2418;
}

.hidden{
display:none;
}

.empty{
text-align:center;
padding:40px;
color:#76675d;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
padding:18px;
z-index:50;
}

.modal.show{
display:flex;
}

.modal-box{
background:white;
width:100%;
max-width:430px;
border-radius:28px;
padding:18px;
position:relative;
}

.close{
position:absolute;
top:12px;
left:12px;
border:0;
background:#111;
color:white;
width:36px;
height:36px;
border-radius:50%;
font-size:24px;
cursor:pointer;
}

.modal-box img{
width:100%;
height:240px;
object-fit:cover;
border-radius:22px;
margin-bottom:15px;
}

.modal-box h2{
font-size:24px;
margin-bottom:8px;
}

.modal-box p{
color:#65564d;
line-height:1.7;
margin-bottom:12px;
}

.modal-price{
font-size:20px;
font-weight:bold;
color:#a66a2c;
}

.modal-sizes{
margin:14px 0;
}

.whatsapp{
position:fixed;
bottom:18px;
left:18px;
background:#25d366;
color:white;
text-decoration:none;
padding:13px 18px;
border-radius:999px;
font-weight:bold;
box-shadow:0 8px 25px rgba(0,0,0,.2);
z-index:30;
display:flex;
align-items:center;
gap:8px;
}

@media(max-width:480px){
.hero{
height:255px;
}

.hero h1{
font-size:28px;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card img{
height:120px;
}

.categories button{
padding:11px 15px;
}

.card-body{
padding:12px;
}

.card h3{
font-size:15px;
}
}
</style>
</head>

<body>

<header class="hero">
<img class="cover" src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=1200" loading="lazy" alt="Coffee shop cover">

<div class="hero-content">
<img class="logo" src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=300" loading="lazy" alt="Coffee shop logo">
<h1>Bean House Coffee</h1>
<p>مشروبات ساخنة وباردة وحلويات يومية طازجة</p>
</div>
</header>

<section class="search">
<input id="searchInput" type="text" placeholder="ابحث عن منتج...">
</section>

<nav class="categories" id="categories">
<button class="active" data-section="all">
<i class="fa-solid fa-border-all"></i>
<span>الكل</span>
</button>

<button data-section="hot">
<i class="fa-solid fa-mug-hot"></i>
<span>مشروبات ساخنة</span>
</button>

<button data-section="cold">
<i class="fa-solid fa-glass-water"></i>
<span>مشروبات باردة</span>
</button>

<button data-section="dessert">
<i class="fa-solid fa-cake-candles"></i>
<span>حلويات</span>
</button>

<button data-section="juice">
<i class="fa-solid fa-lemon"></i>
<span>عصائر</span>
</button>

<button data-section="special">
<i class="fa-solid fa-star"></i>
<span>سبيشل كوفي</span>
</button>
</nav>

<main id="menu"></main>

<div id="empty" class="empty hidden">لا توجد منتجات مطابقة للبحث</div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="close" id="closeModal">×</button>
<img id="modalImage" loading="lazy" alt="">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<div class="modal-price" id="modalPrice"></div>
</div>
</div>

<a class="whatsapp" href="https://wa.me/9647700000000" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
واتساب
</a>

<script>
const sections=[
{id:"hot",title:'<i class="fa-solid fa-mug-hot"></i> مشروبات ساخنة'},
{id:"cold",title:'<i class="fa-solid fa-glass-water"></i> مشروبات باردة'},
{id:"dessert",title:'<i class="fa-solid fa-cake-candles"></i> حلويات'},
{id:"juice",title:'<i class="fa-solid fa-lemon"></i> عصائر'},
{id:"special",title:'<i class="fa-solid fa-star"></i> سبيشل كوفي'}
];

const products=[
{
id:1,
section:"hot",
name:"كابتشينو",
desc:"قهوة إيطالية مع رغوة حليب ناعمة",
image:"https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=600",
sizes:[
{name:"صغير",price:"3,000 د.ع"},
{name:"وسط",price:"4,000 د.ع"},
{name:"كبير",price:"5,000 د.ع"}
]
},
{
id:2,
section:"hot",
name:"هوت شوكليت",
desc:"شوكولاتة ساخنة غنية وكريمية",
image:"https://images.unsplash.com/photo-1542990253-0d0f5be5f0ed?w=600",
sizes:[
{name:"صغير",price:"3,500 د.ع"},
{name:"وسط",price:"4,500 د.ع"},
{name:"كبير",price:"5,500 د.ع"}
]
},
{
id:3,
section:"cold",
name:"آيس لاتيه",
desc:"اسبريسو بارد مع حليب وثلج",
image:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600",
sizes:[
{name:"صغير",price:"4,000 د.ع"},
{name:"وسط",price:"5,000 د.ع"},
{name:"كبير",price:"6,000 د.ع"}
]
},
{
id:4,
section:"cold",
name:"آيس أمريكانو",
desc:"قهوة سوداء باردة بطعم قوي ومنعش",
image:"https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=600",
sizes:[
{name:"صغير",price:"3,000 د.ع"},
{name:"وسط",price:"4,000 د.ع"},
{name:"كبير",price:"5,000 د.ع"}
]
},
{
id:5,
section:"dessert",
name:"تشيز كيك",
desc:"تشيز كيك ناعم بطبقة فاخرة",
image:"https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=600",
sizes:[
{name:"قطعة",price:"5,500 د.ع"},
{name:"قطعتين",price:"10,000 د.ع"},
{name:"بوكس",price:"22,000 د.ع"}
]
},
{
id:6,
section:"dessert",
name:"براوني",
desc:"براوني شوكولاتة غني وطري",
image:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600",
sizes:[
{name:"قطعة",price:"4,500 د.ع"},
{name:"قطعتين",price:"8,000 د.ع"},
{name:"بوكس",price:"18,000 د.ع"}
]
},
{
id:7,
section:"juice",
name:"عصير برتقال",
desc:"عصير برتقال طبيعي ومنعش",
image:"https://images.unsplash.com/photo-1613478223719-2ab802602423?w=600",
sizes:[
{name:"صغير",price:"3,000 د.ع"},
{name:"وسط",price:"3,500 د.ع"},
{name:"كبير",price:"4,500 د.ع"}
]
},
{
id:8,
section:"juice",
name:"ليمون نعناع",
desc:"مشروب بارد بالليمون والنعناع",
image:"https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=600",
sizes:[
{name:"صغير",price:"3,500 د.ع"},
{name:"وسط",price:"4,000 د.ع"},
{name:"كبير",price:"5,000 د.ع"}
]
},
{
id:9,
section:"special",
name:"سبانش لاتيه",
desc:"قهوة باردة بحليب مكثف ونكهة مميزة",
image:"https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=600",
sizes:[
{name:"صغير",price:"5,000 د.ع"},
{name:"وسط",price:"6,000 د.ع"},
{name:"كبير",price:"7,000 د.ع"}
]
},
{
id:10,
section:"special",
name:"موكا كراميل",
desc:"قهوة بالشوكولاتة والكراميل",
image:"https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=600",
sizes:[
{name:"صغير",price:"5,500 د.ع"},
{name:"وسط",price:"6,500 د.ع"},
{name:"كبير",price:"7,500 د.ع"}
]
}
];

const menu=document.getElementById("menu");
const searchInput=document.getElementById("searchInput");
const empty=document.getElementById("empty");
const modal=document.getElementById("modal");
const closeModal=document.getElementById("closeModal");
const modalImage=document.getElementById("modalImage");
const modalTitle=document.getElementById("modalTitle");
const modalDesc=document.getElementById("modalDesc");
const modalPrice=document.getElementById("modalPrice");

function render(){
const text=searchInput.value.trim().toLowerCase();
menu.innerHTML="";
let totalVisible=0;

sections.forEach(sec=>{
const list=products.filter(p=>{
return p.section===sec.id && (
p.name.toLowerCase().includes(text) ||
p.desc.toLowerCase().includes(text)
);
});

if(list.length===0)return;

totalVisible+=list.length;

const section=document.createElement("section");
section.className="menu-section";
section.id=sec.id;

section.innerHTML=`
<h2 class="section-title">${sec.title}</h2>
<div class="grid">
${list.map(p=>`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.image}" loading="lazy" alt="${p.name}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price" id="card-price-${p.id}">${p.sizes[1].price}</div>

<div class="sizes" onclick="event.stopPropagation()">
${p.sizes.map((s,i)=>`
<button class="size-btn ${i===1?'active':''}" onclick="changeCardSize(${p.id},${i},this)">
${s.name}
</button>
`).join("")}
</div>

</div>
</div>
`).join("")}
</div>
`;

menu.appendChild(section);
});

empty.classList.toggle("hidden",totalVisible!==0);
}

function changeCardSize(productId,sizeIndex,btn){
const product=products.find(p=>p.id===productId);
document.getElementById(`card-price-${productId}`).textContent=product.sizes[sizeIndex].price;
btn.parentElement.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function openProduct(id){
const product=products.find(p=>p.id===id);

modalImage.src=product.image;
modalImage.alt=product.name;
modalTitle.textContent=product.name;
modalDesc.textContent=product.desc;
modalPrice.textContent=product.sizes[1].price;

const oldSizes=document.querySelector(".modal-sizes");
if(oldSizes)oldSizes.remove();

const sizeBox=document.createElement("div");
sizeBox.className="sizes modal-sizes";

sizeBox.innerHTML=product.sizes.map((s,i)=>`
<button class="size-btn ${i===1?'active':''}" onclick="changeModalSize('${s.price}',this)">
${s.name}
</button>
`).join("");

modalDesc.after(sizeBox);
modal.classList.add("show");
}

function changeModalSize(price,btn){
modalPrice.textContent=price;
btn.parentElement.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

closeModal.onclick=()=>{
modal.classList.remove("show");
};

modal.onclick=e=>{
if(e.target===modal){
modal.classList.remove("show");
}
};

document.querySelectorAll("[data-section]").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll("[data-section]").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

if(btn.dataset.section==="all"){
window.scrollTo({
top:0,
behavior:"smooth"
});
}else{
document.getElementById(btn.dataset.section)?.scrollIntoView({
behavior:"smooth",
block:"start"
});
}
};
});

searchInput.oninput=render;

render();
</script>

</body>
</html>
